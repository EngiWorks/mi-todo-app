<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TaskFlow — Tablero Kanban</title>

  <script>
    (function () {
      var stored = localStorage.getItem('mi-todo-app-theme');
      var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      var theme = stored === 'dark' || stored === 'light' ? stored : (prefersDark ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', theme);
    })();
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['"Plus Jakarta Sans"', 'system-ui', 'sans-serif'] },
        },
      },
    };
  </script>

  <link rel="stylesheet" href="styles.css">
</head>
<body class="font-sans antialiased">

  <div class="app-bg"></div>

  <div id="sidebar-overlay" class="sidebar-overlay hidden" aria-hidden="true"></div>

  <div class="app-shell">

    <!-- ===== SIDEBAR: PROYECTOS ===== -->
    <aside id="sidebar" class="sidebar" aria-label="Proyectos">

      <div class="sidebar__header">
        <div class="sidebar__brand">
          <div class="sidebar__logo">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5" aria-hidden="true">
              <path stroke-linecap="round" stroke-linejoin="round" d="M9 17V7m0 10a2 2 0 01-2 2H5a2 2 0 01-2-2V7a2 2 0 012-2h2a2 2 0 012 2m0 10a2 2 0 002 2h2a2 2 0 002-2M9 7a2 2 0 012-2h2a2 2 0 012 2m0 10V7m0 10a2 2 0 002 2h2a2 2 0 002-2V7a2 2 0 00-2-2h-2a2 2 0 00-2 2"/>
            </svg>
          </div>
          <div>
            <h1 class="sidebar__title">TaskFlow</h1>
            <p class="sidebar__subtitle">Tablero Kanban</p>
          </div>
        </div>
        <button type="button" id="sidebar-close" class="sidebar-close" aria-label="Cerrar menú">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
          </svg>
        </button>
      </div>

      <div class="sidebar__section-label">Proyectos · arrastra tareas aquí</div>

      <ul id="project-list" class="project-list" role="list"></ul>

      <form id="add-project-form" class="add-project-form">
        <input
          type="text"
          id="project-name-input"
          class="input-field input-field--compact"
          placeholder="Nuevo proyecto..."
          maxlength="50"
          autocomplete="off"
          aria-label="Nombre del proyecto"
        >
        <button type="submit" class="btn-icon" aria-label="Crear proyecto" title="Crear proyecto">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/>
          </svg>
        </button>
      </form>

      <div class="sidebar__footer">
        <button type="button" id="theme-toggle" class="sidebar-footer-btn" aria-label="Cambiar tema" title="Cambiar tema">
          <svg class="theme-toggle__icon theme-toggle__icon--sun w-4 h-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/>
          </svg>
          <svg class="theme-toggle__icon theme-toggle__icon--moon w-4 h-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/>
          </svg>
          <span>Tema</span>
        </button>
      </div>
    </aside>

    <!-- ===== PANEL PRINCIPAL: KANBAN ===== -->
    <div class="main-panel">

      <header class="main-header">
        <button type="button" id="sidebar-open" class="sidebar-open" aria-label="Abrir menú de proyectos">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16"/>
          </svg>
        </button>

        <div class="main-header__info">
          <div class="main-header__title-row">
            <span id="project-color-dot" class="project-color-dot"></span>
            <h2 id="project-title" class="main-header__title">Cargando...</h2>
          </div>
          <p id="task-counter" class="main-header__counter" aria-live="polite">Cargando tareas...</p>
        </div>

        <div class="main-header__actions">
          <button type="button" id="add-task-btn" class="btn-primary btn-primary--compact" title="Nueva tarea" aria-label="Agregar tarea">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5" aria-hidden="true">
              <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/>
            </svg>
            <span class="btn-primary__text">Nueva tarea</span>
          </button>
          <button type="button" id="rename-project-btn" class="header-action-btn" title="Renombrar proyecto" aria-label="Renombrar proyecto">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" aria-hidden="true">
              <path stroke-linecap="round" stroke-linejoin="round" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>
            </svg>
          </button>
          <button type="button" id="delete-project-btn" class="header-action-btn header-action-btn--danger" title="Eliminar proyecto" aria-label="Eliminar proyecto">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" aria-hidden="true">
              <path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
            </svg>
          </button>
        </div>
      </header>

      <div id="error-banner" class="error-banner hidden" role="alert"></div>

      <main id="kanban-board" class="kanban-board" aria-label="Tablero Kanban">
        <!-- Columnas generadas por app.js -->
      </main>

    </div>
  </div>

  <!-- ===== MODAL: CREAR / EDITAR TAREA ===== -->
  <div id="task-modal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div class="modal__backdrop" id="modal-backdrop"></div>
    <div class="modal__dialog">
      <header class="modal__header">
        <h3 id="modal-title" class="modal__title">Nueva tarea</h3>
        <button type="button" id="modal-close" class="modal__close" aria-label="Cerrar">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
          </svg>
        </button>
      </header>

      <form id="task-form" class="modal__form">
        <div class="form-group">
          <label for="modal-title-input" class="form-group__label">Título <span class="form-group__required">*</span></label>
          <input type="text" id="modal-title-input" class="input-field w-full" placeholder="¿Qué necesitas hacer?" maxlength="200" required autocomplete="off">
        </div>

        <div class="form-group">
          <label for="modal-project-select" class="form-group__label">Proyecto</label>
          <select id="modal-project-select" class="priority-select w-full"></select>
        </div>

        <div class="form-group">
          <label for="modal-description-input" class="form-group__label">Descripción</label>
          <textarea id="modal-description-input" class="textarea-field w-full" placeholder="Detalles adicionales..." rows="3" maxlength="1000"></textarea>
        </div>

        <div class="modal__grid">
          <div class="form-group">
            <label for="modal-priority-select" class="form-group__label">Prioridad</label>
            <select id="modal-priority-select" class="priority-select w-full">
              <option value="high">Alta</option>
              <option value="medium" selected>Media</option>
              <option value="low">Baja</option>
            </select>
          </div>
          <div class="form-group">
            <label for="modal-status-select" class="form-group__label">Estatus</label>
            <select id="modal-status-select" class="priority-select w-full">
              <option value="todo">Por Hacer</option>
              <option value="in_progress">En Progreso</option>
              <option value="done">Terminada</option>
            </select>
          </div>
        </div>

        <div class="form-group">
          <label for="modal-due-date-input" class="form-group__label">Fecha de vencimiento</label>
          <input type="date" id="modal-due-date-input" class="date-input w-full">
        </div>

        <footer class="modal__footer">
          <button type="button" id="modal-delete-btn" class="btn-ghost-danger hidden">Eliminar tarea</button>
          <div class="modal__footer-actions">
            <button type="button" id="modal-cancel-btn" class="btn-secondary">Cancelar</button>
            <button type="submit" id="modal-save-btn" class="btn-primary">Guardar</button>
          </div>
        </footer>
      </form>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
