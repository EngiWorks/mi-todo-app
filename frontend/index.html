<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mi Lista de Tareas</title>

  <!-- Aplicar tema guardado antes de pintar (evita parpadeo) -->
  <script>
    (function () {
      var stored = localStorage.getItem('mi-todo-app-theme');
      var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      var theme = stored === 'dark' || stored === 'light' ? stored : (prefersDark ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', theme);
    })();
  </script>

  <!-- Tipografía: Plus Jakarta Sans -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- Tailwind CSS vía CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['"Plus Jakarta Sans"', 'system-ui', 'sans-serif'],
          },
        },
      },
    };
  </script>

  <link rel="stylesheet" href="styles.css">
</head>
<body class="min-h-screen font-sans antialiased">

  <div class="app-bg"></div>

  <!-- Botón para alternar tema claro / oscuro -->
  <button
    type="button"
    id="theme-toggle"
    class="theme-toggle"
    aria-label="Cambiar a modo oscuro"
    title="Cambiar tema"
  >
    <svg class="theme-toggle__icon theme-toggle__icon--sun" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" aria-hidden="true">
      <path stroke-linecap="round" stroke-linejoin="round" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/>
    </svg>
    <svg class="theme-toggle__icon theme-toggle__icon--moon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" aria-hidden="true">
      <path stroke-linecap="round" stroke-linejoin="round" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/>
    </svg>
  </button>

  <div class="container relative mx-auto px-4 py-8 sm:py-12 max-w-2xl">

    <!-- ===== HEADER ===== -->
    <header class="text-center mb-8 sm:mb-10">
      <div class="app-logo inline-flex items-center justify-center w-14 h-14 rounded-2xl text-white mb-4">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-7 h-7" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"/>
        </svg>
      </div>
      <h1 class="app-title text-3xl sm:text-4xl font-bold tracking-tight">
        Mi Lista de Tareas
      </h1>
      <p id="task-counter" class="app-subtitle mt-2 text-sm sm:text-base" aria-live="polite">
        Cargando tareas...
      </p>
    </header>

    <!-- Mensaje de error de API -->
    <div id="error-banner" class="error-banner hidden" role="alert"></div>

    <!-- ===== TARJETA PRINCIPAL ===== -->
    <main class="main-card rounded-3xl overflow-hidden">

      <!-- Formulario para agregar tareas -->
      <section class="p-4 sm:p-6 border-b section-border" aria-label="Agregar nueva tarea">
        <form id="add-task-form" class="flex flex-col gap-3">
          <div class="flex flex-col sm:flex-row gap-2 sm:gap-3">
            <label for="task-input" class="sr-only">Nueva tarea</label>
            <input
              type="text"
              id="task-input"
              name="task"
              placeholder="¿Qué necesitas hacer?"
              autocomplete="off"
              maxlength="200"
              class="input-field flex-1"
              required
            >
            <button type="submit" id="add-task-btn" class="btn-primary sm:shrink-0">
              <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5" aria-hidden="true">
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/>
              </svg>
              Agregar
            </button>
          </div>

          <div class="form-options">
            <div class="form-option">
              <label for="priority-select" class="form-option__label">Prioridad</label>
              <select id="priority-select" name="priority" class="priority-select w-full" aria-label="Prioridad de la tarea">
                <option value="high">Alta</option>
                <option value="medium" selected>Media</option>
                <option value="low">Baja</option>
              </select>
            </div>
            <div class="form-option">
              <label for="due-date-input" class="form-option__label">Fecha de vencimiento</label>
              <input
                type="date"
                id="due-date-input"
                name="dueDate"
                class="date-input w-full"
                aria-label="Fecha de vencimiento (opcional)"
              >
            </div>
          </div>
        </form>
      </section>

      <!-- Filtros de visualización -->
      <nav id="filter-nav" class="flex border-b section-border surface-muted" role="tablist" aria-label="Filtrar tareas">
        <button type="button" data-filter="all" class="filter-btn filter-btn--active" role="tab" aria-selected="true">
          Todas
        </button>
        <button type="button" data-filter="pending" class="filter-btn" role="tab" aria-selected="false">
          Pendientes
        </button>
        <button type="button" data-filter="completed" class="filter-btn" role="tab" aria-selected="false">
          Completadas
        </button>
      </nav>

      <!-- Lista de tareas -->
      <section class="p-4 sm:p-6" aria-label="Lista de tareas">
        <ul id="task-list" class="space-y-3" role="list"></ul>

        <div id="empty-state" class="hidden text-center py-14">
          <div class="empty-state__icon inline-flex items-center justify-center w-16 h-16 rounded-full mb-4">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-8 h-8" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
              <path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
            </svg>
          </div>
          <p class="empty-state__title text-lg font-medium">No hay tareas por aquí</p>
          <p class="empty-state__subtitle text-sm mt-1">Agrega una nueva tarea arriba</p>
        </div>
      </section>

      <!-- Barra inferior: limpiar completadas -->
      <footer id="task-footer" class="hidden px-4 sm:px-6 py-4 border-t section-border surface-footer flex justify-end">
        <button type="button" id="clear-completed-btn" class="btn-ghost-danger">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
          </svg>
          Limpiar completadas
        </button>
      </footer>

    </main>

    <p class="app-footer-text text-center mt-6 text-xs">
      Las tareas se guardan en la base de datos SQLite del servidor
    </p>

  </div>

  <script src="app.js"></script>
</body>
</html>
